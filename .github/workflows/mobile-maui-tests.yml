name: mobile-maui-tests

on:
  push:
    branches: [ main ]
    paths:
      - mobile-maui/**
      - .github/workflows/mobile-maui-tests.yml
  pull_request:
    branches: [ main ]
    paths:
      - mobile-maui/**
      - .github/workflows/mobile-maui-tests.yml

jobs:
  mobile-test-host:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run non-Windows mobile test host
        run: dotnet test mobile-maui/ProjectHX.Mobile.Tests/ProjectHX.Mobile.Tests.csproj --configuration Release --logger "trx;LogFileName=maui-tests.trx"
